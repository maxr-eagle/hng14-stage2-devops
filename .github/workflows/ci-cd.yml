name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python lint tools
        run: pip install flake8

      - name: Run Python lint
        run: |
          flake8 api worker
     
      # Node linting
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run JS lint (basic check)
        working-directory: frontend
        run: |
          npx eslint . || echo "ESlint not configured yet"

      # Docker linting    
      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -r api/requirements.txt
        pip install pytest pytest-cov

    - name: Run tests
      run: |
        python -m pytest api/tests -q \
          --cov=api \
          --cov-report=xml:api/coverage.xml \
          --cov-report=term-missing

    # Upload coverage report as a pipeline artifact
    # Available for download in the Actions tab for 7 days
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: api/coverage.xml
        retention-days: 7      


  
  # STAGE 3 — BUILD
  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      # Build and push API image
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ env.SHA }}
            localhost:5000/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push Worker image
      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ env.SHA }}
            localhost:5000/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push Frontend image
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ env.SHA }}
            localhost:5000/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Verify all three images made it into the registry
      - name: Verify images in registry
        run: |
          docker pull localhost:5000/api:latest
          docker pull localhost:5000/worker:latest
          docker pull localhost:5000/frontend:latest
          echo "All images successfully pushed to local registry"

 
  # STAGE 4 — SECURITY SCAN
  security-scan:
    runs-on: ubuntu-latest
    needs: build

    # Required for uploading SARIF results to GitHub Security tab
    permissions:
      security-events: write

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      # We need to rebuild images into this job's local registry
      - name: Rebuild API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ env.SHA }}
            localhost:5000/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Rebuild Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ env.SHA }}
            localhost:5000/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Rebuild Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ env.SHA }}
            localhost:5000/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Install Trivy
      - name: Install Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      # Scan API image
      - name: Scan API image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output api-scan.sarif \
            localhost:5000/api:latest
        continue-on-error: true

      - name: Upload API scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: api-scan.sarif
          category: api-image-scan

      # Scan Worker image
      - name: Scan Worker image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output worker-scan.sarif \
            localhost:5000/worker:latest
        continue-on-error: true

      - name: Upload Worker scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: worker-scan.sarif
          category: worker-image-scan

      # Scan Frontend image
      - name: Scan Frontend image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output frontend-scan.sarif \
            localhost:5000/frontend:latest
        continue-on-error: true

      - name: Upload Frontend scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: frontend-scan.sarif
          category: frontend-image-scan


      - name: Fail pipeline on CRITICAL findings
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --format table localhost:5000/api:latest
          trivy image --exit-code 1 --severity CRITICAL \
            --format table localhost:5000/worker:latest
          trivy image --exit-code 1 --severity CRITICAL \
            --format table localhost:5000/frontend:latest
         
  # STAGE 5 — INTEGRATION TEST
  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        run: |
          echo "REDIS_PASSWORD=integration-test-password" > .env
          echo "API_URL=http://api:8000" >> .env

      # Build and start the full stack
      - name: Build and start stack
        run: |
          docker compose up --build -d --no-deps redis
          sleep 5
          docker compose up --build -d --no-deps api
          sleep 10
          docker compose logs api
          docker compose ps api 2>/dev/null | grep -oE '(healthy|unhealthy|starting)' | head -1 || echo "none"
          docker compose up --build -d --no-deps worker
          docker compose up --build -d --no-deps frontend

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for all services to be healthy..."
          TIMEOUT=120
          INTERVAL=5
          ELAPSED=0

          while [ $ELAPSED -lt $TIMEOUT ]; do
            API=$(docker compose ps api 2>/dev/null | awk '/api/{print $0}' | grep -oE 'healthy|unhealthy|starting' | head -1 || echo "none")
            WORKER=$(docker compose ps worker 2>/dev/null | awk '/worker/{print $0}' | grep -oE 'healthy|unhealthy|starting' | head -1 || echo "none")
            FRONTEND=$(docker compose ps frontend 2>/dev/null | awk '/frontend/{print $0}' | grep -oE 'healthy|unhealthy|starting' | head -1 || echo "none")
            REDIS=$(docker compose ps redis 2>/dev/null | awk '/redis/{print $0}' | grep -oE 'healthy|unhealthy|starting' | head -1 || echo "none")

            echo "Redis: $REDIS_HEALTH | API: $API_HEALTH | Worker: $WORKER_HEALTH | Frontend: $FRONTEND_HEALTH"

            if [ "$API_HEALTH" = "healthy" ] && \
               [ "$WORKER_HEALTH" = "healthy" ] && \
               [ "$FRONTEND_HEALTH" = "healthy" ] && \
               [ "$REDIS_HEALTH" = "healthy" ]; then
              echo "All services are healthy!"
              break
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "========================================="
            echo "TIMEOUT — dumping diagnostics"
            echo "========================================="
            echo "--- docker compose ps ---"
            docker compose ps
            echo "--- API logs ---"
            docker compose logs api
            echo "--- API health check logs ---"
            docker compose ps api
            echo "--- Frontend logs ---"
            docker compose logs frontend
            echo "--- Frontend health check logs ---"
            docker compose ps frontend
            echo "--- Redis logs ---"
            docker compose logs redis
            echo "--- Worker logs ---"
            docker compose logs worker
            exit 1
          fi

      - name: Submit a job
        run: |
          echo "Submitting job through frontend..."
          RESPONSE=$(curl -s -X POST http://localhost:3000/submit \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Response: $RESPONSE"

          # Extract job_id from response
          JOB_ID=$(echo $RESPONSE | python3 -c "import sys, json; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"

          # Save job_id for the next step
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll job until completion
        run: |
          echo "Polling job $JOB_ID for completion..."
          TIMEOUT=60
          INTERVAL=2
          ELAPSED=0

          while [ $ELAPSED -lt $TIMEOUT ]; do
            RESPONSE=$(curl -s http://localhost:3000/status/$JOB_ID)
            STATUS=$(echo $RESPONSE | python3 -c "import sys, json; print(json.load(sys.stdin).get('status', 'unknown'))")
            echo "Job status: $STATUS (elapsed: ${ELAPSED}s)"

            if [ "$STATUS" = "completed" ] || [ "$STATUS" = "failed" ]; then
              echo "Job reached terminal state: $STATUS"
              echo "FINAL_STATUS=$STATUS" >> $GITHUB_ENV
              break
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          # Timeout check
          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "Timed out waiting for job to complete"
            docker compose logs worker
            exit 1
          fi

      
      - name: Assert job completed successfully
        run: |
          echo "Final job status: $FINAL_STATUS"
          if [ "$FINAL_STATUS" != "completed" ]; then
            echo "FAILED: Expected status 'completed' but got '$FINAL_STATUS'"
            docker compose logs
            exit 1
          fi
          echo "PASSED: Job completed successfully"

      - name: Tear down stack
        if: always()
        run: |
          echo "Tearing down stack..."
          docker compose down -v
          echo "Stack torn down cleanly"
          
          
  # STAGE 6 — DEPLOY
  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        run: echo "SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Create .env file
        run: |
          echo "REDIS_PASSWORD=deploy-test-password" > .env
          echo "API_URL=http://api:8000" >> .env


      - name: Start initial stack
        run: |
          docker compose up --build -d
          echo "Initial stack started"

      - name: Wait for initial stack to be healthy
        run: |
          TIMEOUT=120
          INTERVAL=5
          ELAPSED=0

          while [ $ELAPSED -lt $TIMEOUT ]; do
            API=$(docker compose ps api 2>/dev/null | awk '/api/{print $0}' | grep -oE 'healthy|unhealthy|starting' | head -1 || echo "none")
            WORKER=$(docker compose ps worker 2>/dev/null | awk '/worker/{print $0}' | grep -oE 'healthy|unhealthy|starting' | head -1 || echo "none")
            FRONTEND=$(docker compose ps frontend 2>/dev/null | awk '/frontend/{print $0}' | grep -oE 'healthy|unhealthy|starting' | head -1 || echo "none")
            REDIS=$(docker compose ps redis 2>/dev/null | awk '/redis/{print $0}' | grep -oE 'healthy|unhealthy|starting' | head -1 || echo "none")

            echo "Redis: $REDIS | API: $API | Worker: $WORKER | Frontend: $FRONTEND"

            if [ "$API" = "healthy" ] && \
               [ "$WORKER" = "healthy" ] && \
               [ "$FRONTEND" = "healthy" ] && \
               [ "$REDIS" = "healthy" ]; then
              echo "Initial stack is healthy"
              break
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "Initial stack failed to become healthy"
            docker compose logs
            exit 1
          fi

      - name: Rolling update
        run: |
          set -e

          rolling_update() {
            SERVICE=$1
            TIMEOUT=60
            INTERVAL=2
            ELAPSED=0
            SUCCESS=false

            echo "========================================="
            echo "Rolling update: $SERVICE"
            echo "========================================="

            # Build new image for this service
            docker compose build $SERVICE

            # Start new container alongside the old one
            # --no-deps prevents restarting dependencies
            # --scale 2 runs old and new simultaneously
            docker compose up -d --no-deps --scale $SERVICE=2 --no-recreate $SERVICE
            sleep 5

            # Get ID of the newest container for this service
            NEW_CONTAINER=$(docker compose ps -q $SERVICE | tail -1)
            echo "New container ID: $NEW_CONTAINER"

            # Poll health check on new container
            while [ $ELAPSED -lt $TIMEOUT ]; do
              HEALTH=$(docker compose ps $SERVICE 2>/dev/null | grep -oE '(healthy|unhealthy|starting)' | tail -1 || echo "unknown")

              echo "$SERVICE new container health: $HEALTH (${ELAPSED}s)"

              if [ "$HEALTH" = "healthy" ]; then
                echo "$SERVICE new container is healthy"
                SUCCESS=true
                break
              fi

              if [ "$HEALTH" = "unhealthy" ]; then
                echo "$SERVICE new container is unhealthy — aborting"
                break
              fi

              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            if [ "$SUCCESS" = "true" ]; then
              echo "$SERVICE rolling update successful"
              # Scale back to 1 — Docker removes the oldest container
              docker compose up -d --no-deps --scale $SERVICE=1 $SERVICE
              echo "$SERVICE old container removed"
            else
              echo "ERROR: $SERVICE failed health check within ${TIMEOUT}s"
              echo "Aborting — keeping old container running"
              # Scale back to 1 — Docker removes the newest (failed) container
              docker compose stop $NEW_CONTAINER
              docker rm $NEW_CONTAINER
              echo "$SERVICE old container preserved"
              exit 1
            fi
          }

          # Update each service in order
          # Redis is skipped — it has persistent data
          rolling_update api
          rolling_update worker
          rolling_update frontend

      - name: Show final deployment state
        run: |
          echo "========================================="
          echo "Final deployment state"
          echo "========================================="
          docker compose ps
          echo "========================================="

      - name: Tear down
        if: always()
        run: docker compose down -v  