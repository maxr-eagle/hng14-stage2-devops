name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python lint tools
        run: pip install flake8

      - name: Run Python lint
        run: |
          flake8 api worker
     
      # Node linting
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run JS lint (basic check)
        working-directory: frontend
        run: |
          npx eslint . || echo "ESlint not configured yet"

      # Docker linting    
      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -r api/requirements.txt
        pip install pytest pytest-cov

    - name: Run tests
      run: |
        python -m pytest api/tests -q \
          --cov=api \
          --cov-report=xml:api/coverage.xml \
          --cov-report=term-missing

    # Upload coverage report as a pipeline artifact
    # Available for download in the Actions tab for 7 days
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: api/coverage.xml
        retention-days: 7      


  
  # STAGE 3 — BUILD
  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      # Build and push API image
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ env.SHA }}
            localhost:5000/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push Worker image
      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ env.SHA }}
            localhost:5000/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push Frontend image
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ env.SHA }}
            localhost:5000/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Verify all three images made it into the registry
      - name: Verify images in registry
        run: |
          docker pull localhost:5000/api:latest
          docker pull localhost:5000/worker:latest
          docker pull localhost:5000/frontend:latest
          echo "All images successfully pushed to local registry"

 
  # STAGE 4 — SECURITY SCAN
  security-scan:
    runs-on: ubuntu-latest
    needs: build

    # Required for uploading SARIF results to GitHub Security tab
    permissions:
      security-events: write

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      # We need to rebuild images into this job's local registry
      - name: Rebuild API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ env.SHA }}
            localhost:5000/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Rebuild Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ env.SHA }}
            localhost:5000/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Rebuild Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ env.SHA }}
            localhost:5000/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Install Trivy
      - name: Install Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      # Scan API image
      - name: Scan API image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output api-scan.sarif \
            localhost:5000/api:latest
        continue-on-error: true

      - name: Upload API scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: api-scan.sarif
          category: api-image-scan

      # Scan Worker image
      - name: Scan Worker image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output worker-scan.sarif \
            localhost:5000/worker:latest
        continue-on-error: true

      - name: Upload Worker scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: worker-scan.sarif
          category: worker-image-scan

      # Scan Frontend image
      - name: Scan Frontend image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output frontend-scan.sarif \
            localhost:5000/frontend:latest
        continue-on-error: true

      - name: Upload Frontend scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: frontend-scan.sarif
          category: frontend-image-scan


      - name: Fail pipeline on CRITICAL findings
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --format table localhost:5000/api:latest
          trivy image --exit-code 1 --severity CRITICAL \
            --format table localhost:5000/worker:latest
          trivy image --exit-code 1 --severity CRITICAL \
            --format table localhost:5000/frontend:latest
         
  # STAGE 5 — INTEGRATION TEST
  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        run: |
          echo "REDIS_PASSWORD=integration-test-password" > .env
          echo "API_URL=http://api:8000" >> .env

      # Build and start the full stack
      - name: Build and start stack
        run: |
          docker compose up --build -d --no-deps redis
          sleep 5
          docker compose up --build -d --no-deps api
          sleep 10
          docker compose logs api
          docker compose ps api 2>/dev/null | grep -oE '(healthy|unhealthy|starting)' | head -1 || echo "none"
          docker compose up --build -d --no-deps worker
          docker compose up --build -d --no-deps frontend

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for all services to be healthy..."

          PROJECT=$(docker compose ps --format json | python3 -c "import sys, json
          data = sys.stdin.read().strip()
          lines = [l for l in data.splitlines() if l.strip()]
          first = json.loads(lines[0])
          name = first['Name']
          parts = name.rsplit('-', 2)
          print(parts[0])
          ")
          echo "Project name: $PROJECT"

          API_CONTAINER="${PROJECT}-api-1"
          WORKER_CONTAINER="${PROJECT}-worker-1"
          FRONTEND_CONTAINER="${PROJECT}-frontend-1"
          REDIS_CONTAINER="${PROJECT}-redis-1"

          echo "Watching containers:"
          echo "  $API_CONTAINER"
          echo "  $WORKER_CONTAINER"
          echo "  $FRONTEND_CONTAINER"
          echo "  $REDIS_CONTAINER"

          TIMEOUT=120
          INTERVAL=5
          ELAPSED=0

          while [ $ELAPSED -lt $TIMEOUT ]; do
            API=$(docker inspect --format='{{.State.Health.Status}}' $API_CONTAINER 2>/dev/null || echo "none")
            WORKER=$(docker inspect --format='{{.State.Health.Status}}' $WORKER_CONTAINER 2>/dev/null || echo "none")
            FRONTEND=$(docker inspect --format='{{.State.Health.Status}}' $FRONTEND_CONTAINER 2>/dev/null || echo "none")
            REDIS=$(docker inspect --format='{{.State.Health.Status}}' $REDIS_CONTAINER 2>/dev/null || echo "none")

            echo "Redis: $REDIS | API: $API | Worker: $WORKER | Frontend: $FRONTEND"

            if [ "$API" = "healthy" ] && \
               [ "$WORKER" = "healthy" ] && \
               [ "$FRONTEND" = "healthy" ] && \
               [ "$REDIS" = "healthy" ]; then
              echo "All services are healthy!"
              echo "API_CONTAINER=$API_CONTAINER" >> $GITHUB_ENV
              echo "WORKER_CONTAINER=$WORKER_CONTAINER" >> $GITHUB_ENV
              echo "FRONTEND_CONTAINER=$FRONTEND_CONTAINER" >> $GITHUB_ENV
              echo "REDIS_CONTAINER=$REDIS_CONTAINER" >> $GITHUB_ENV
              break
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "========================================="
            echo "TIMEOUT — dumping diagnostics"
            echo "========================================="
            echo "--- docker compose ps ---"
            docker compose ps
            echo "--- API logs ---"
            docker compose logs api
            echo "--- Frontend logs ---"
            docker compose logs frontend
            echo "--- Frontend health check ---"
            docker inspect --format='{{json .State.Health}}' $FRONTEND_CONTAINER 2>/dev/null || echo "container not found"
            echo "--- Redis logs ---"
            docker compose logs redis
            echo "--- Worker logs ---"
            docker compose logs worker
            exit 1
          fi

      - name: Submit a job
        run: |
          echo "Submitting job through frontend..."
          RESPONSE=$(curl -s -X POST http://localhost:3000/submit \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Response: $RESPONSE"

          # Extract job_id from response
          JOB_ID=$(echo $RESPONSE | python3 -c "import sys, json; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"

          # Save job_id for the next step
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll job until completion
        run: |
          echo "Polling job $JOB_ID for completion..."
          TIMEOUT=60
          INTERVAL=2
          ELAPSED=0

          while [ $ELAPSED -lt $TIMEOUT ]; do
            RESPONSE=$(curl -s http://localhost:3000/status/$JOB_ID)
            STATUS=$(echo $RESPONSE | python3 -c "import sys, json; print(json.load(sys.stdin).get('status', 'unknown'))")
            echo "Job status: $STATUS (elapsed: ${ELAPSED}s)"

            if [ "$STATUS" = "completed" ] || [ "$STATUS" = "failed" ]; then
              echo "Job reached terminal state: $STATUS"
              echo "FINAL_STATUS=$STATUS" >> $GITHUB_ENV
              break
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          # Timeout check
          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "Timed out waiting for job to complete"
            docker compose logs worker
            exit 1
          fi

      
      - name: Assert job completed successfully
        run: |
          echo "Final job status: $FINAL_STATUS"
          if [ "$FINAL_STATUS" != "completed" ]; then
            echo "FAILED: Expected status 'completed' but got '$FINAL_STATUS'"
            docker compose logs
            exit 1
          fi
          echo "PASSED: Job completed successfully"

      - name: Tear down stack
        if: always()
        run: |
          echo "Tearing down stack..."
          docker compose down -v
          echo "Stack torn down cleanly"
          
          
  # STAGE 6 — DEPLOY
  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        run: echo "SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Create .env file
        run: |
          echo "REDIS_PASSWORD=deploy-test-password" > .env
          echo "API_URL=http://api:8000" >> .env


      - name: Start initial stack
        run: |
          docker compose up --build -d
          echo "Initial stack started"

      - name: Wait for initial stack to be healthy
        run: |
          echo "Waiting for initial stack to be healthy..."

          PROJECT=$(docker compose ps --format json | python3 -c "import sys, json
          data = sys.stdin.read().strip()
          lines = [l for l in data.splitlines() if l.strip()]
          first = json.loads(lines[0])
          name = first['Name']
          parts = name.rsplit('-', 2)
          print(parts[0])
          ")
          echo "Project name: $PROJECT"

          API_CONTAINER="${PROJECT}-api-1"
          WORKER_CONTAINER="${PROJECT}-worker-1"
          FRONTEND_CONTAINER="${PROJECT}-frontend-1"
          REDIS_CONTAINER="${PROJECT}-redis-1"

          TIMEOUT=120
          INTERVAL=5
          ELAPSED=0

          while [ $ELAPSED -lt $TIMEOUT ]; do
            API=$(docker inspect --format='{{.State.Health.Status}}' $API_CONTAINER 2>/dev/null || echo "none")
            WORKER=$(docker inspect --format='{{.State.Health.Status}}' $WORKER_CONTAINER 2>/dev/null || echo "none")
            FRONTEND=$(docker inspect --format='{{.State.Health.Status}}' $FRONTEND_CONTAINER 2>/dev/null || echo "none")
            REDIS=$(docker inspect --format='{{.State.Health.Status}}' $REDIS_CONTAINER 2>/dev/null || echo "none")

            echo "Redis: $REDIS | API: $API | Worker: $WORKER | Frontend: $FRONTEND"

            if [ "$API" = "healthy" ] && \
               [ "$WORKER" = "healthy" ] && \
               [ "$FRONTEND" = "healthy" ] && \
               [ "$REDIS" = "healthy" ]; then
              echo "Initial stack is healthy"
              echo "API_CONTAINER=$API_CONTAINER" >> $GITHUB_ENV
              echo "WORKER_CONTAINER=$WORKER_CONTAINER" >> $GITHUB_ENV
              echo "FRONTEND_CONTAINER=$FRONTEND_CONTAINER" >> $GITHUB_ENV
              echo "REDIS_CONTAINER=$REDIS_CONTAINER" >> $GITHUB_ENV
              break
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "Initial stack failed to become healthy"
            docker compose logs
            exit 1
          fi

      - name: Rolling update
        run: |
          set -e

          rolling_update() {
            SERVICE=$1
            TIMEOUT=60
            INTERVAL=2
            ELAPSED=0
            SUCCESS=false

            echo "========================================="
            echo "Rolling update: $SERVICE"
            echo "========================================="

            # Build new image
            docker compose build $SERVICE

            # Show available images so we can see exact image name
            echo "--- Available images ---"
            docker images | grep $SERVICE

            # Get the exact image name docker compose built
            IMAGE_NAME=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep $SERVICE | head -1)
            echo "Using image: $IMAGE_NAME"

            # Start test container
            TEST_CONTAINER="${SERVICE}-test-$$"
            echo "Starting test container: $TEST_CONTAINER"

            docker run -d \
              --name $TEST_CONTAINER \
              --network hng14-stage2-devops_internal \
              --env-file .env \
              -e REDIS_HOST=redis \
              -e REDIS_PORT=6379 \
              -e API_URL=http://api:8000 \
              $IMAGE_NAME

            echo "Test container started"
            echo "--- Test container inspect ---"
            docker inspect $TEST_CONTAINER | python3 -c "import sys, json
            data = json.load(sys.stdin)[0]
            print('Status:', data['State']['Status'])
            print('Health:', data['State'].get('Health', {}).get('Status', 'no healthcheck'))
            "

            # Wait for test container health
            while [ $ELAPSED -lt $TIMEOUT ]; do
              HEALTH=$(docker inspect \
                --format='{{.State.Health.Status}}' \
                $TEST_CONTAINER 2>/dev/null || echo "unknown")

              echo "$SERVICE test container health: $HEALTH (${ELAPSED}s)"

              if [ "$HEALTH" = "healthy" ]; then
                SUCCESS=true
                echo "$SERVICE new image is healthy"
                break
              fi

              if [ "$HEALTH" = "unhealthy" ]; then
                echo "$SERVICE new image is unhealthy — dumping logs"
                docker logs $TEST_CONTAINER
                echo "--- Health check log ---"
                docker inspect --format='{{json .State.Health}}' $TEST_CONTAINER
                break
              fi

              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            # If timed out dump logs
            if [ "$SUCCESS" = "false" ]; then
              echo "--- Test container logs ---"
              docker logs $TEST_CONTAINER
              echo "--- Health check details ---"
              docker inspect --format='{{json .State.Health}}' $TEST_CONTAINER
            fi

            # Always remove test container
            docker stop $TEST_CONTAINER 2>/dev/null || true
            docker rm $TEST_CONTAINER 2>/dev/null || true

            if [ "$SUCCESS" = "true" ]; then
              echo "$SERVICE new image passed health check"
              docker compose up -d --no-deps --force-recreate $SERVICE
              echo "$SERVICE rolling update complete"
            else
              echo "ERROR: $SERVICE failed health check within ${TIMEOUT}s"
              echo "Aborting — keeping old container running"
              exit 1
            fi
          }

          rolling_update api
          rolling_update worker
          rolling_update frontend

      - name: Show final deployment state
        run: |
          echo "========================================="
          echo "Final deployment state"
          echo "========================================="
          docker compose ps
          echo "========================================="

      - name: Tear down
        if: always()
        run: docker compose down -v  